<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norvoter - Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/meters/css/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="container">
                <div class="header__inner">
                    <a href="/" class="header__logo">
                        <img src="/static/meters/imagers/logo.png" alt="Norvoter" class="logo__image">
                        <span class="logo__text">Norvoter</span>
                    </a>
                    <nav class="header__nav">
                        <a href="/" class="nav__link">счетчики</a>
                        <a href="/request_list.html" class="nav__link">заявки</a>
                    </nav>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <div class="page-header">
                    <h1 class="page-title">Вход</h1>
                </div>

                <div class="login-card">
                    <form id="login-form" class="login-form">
                        <div class="form-group">
                            <label for="username">Имя пользователя</label>
                            <input type="text" id="username" name="username" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="password">Пароль</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Войти</button>
                            <a href="/register.html" class="btn btn-secondary">Нет аккаунта? Зарегистрироваться</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };
            
            const response = await fetch('/api/users/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            
            const result = await response.json();
            if (result.success) {
                window.location.href = '/';
            } else {
                alert('Ошибка: ' + result.error);
            }
        });
    </script>
</body>
</html>
