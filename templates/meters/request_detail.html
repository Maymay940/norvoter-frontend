<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norvoter - Детали заявки</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/meters/css/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="container">
                <div class="header__inner">
                    <a href="/" class="header__logo">
                        <img src="/static/meters/imagers/logo.png" alt="Norvoter" class="logo__image">
                        <span class="logo__text">Norvoter</span>
                    </a>
                    <nav class="header__nav">
                        <a href="/" class="nav__link">счетчики</a>
                        <a href="/request_list.html" class="nav__link nav__link--active">заявки</a>
                    </nav>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <div class="page-header">
                    <h1 class="page-title" id="request-title">Загрузка...</h1>
                    <span class="request-status-badge" id="request-status">---</span>
                </div>

                <div class="request-view-card">
                    <div class="request-info">
                        <div class="info-row">
                            <span class="info-label">Дата создания:</span>
                            <span class="info-value" id="request-created">---</span>
                        </div>
                        <div class="info-row" id="request-completed-row" style="display: none;">
                            <span class="info-label">Дата завершения:</span>
                            <span class="info-value" id="request-completed">---</span>
                        </div>
                        <div class="info-row" id="request-comment-row" style="display: none;">
                            <span class="info-label">Комментарий:</span>
                            <span class="info-value" id="request-comment">---</span>
                        </div>
                    </div>

                    <h2 class="section-title">Показания счетчиков</h2>
                    <div id="positions-list" class="request-meters-list"></div>

                    <div id="totals-section" class="request-totals" style="display: none;">
                        <div class="total-row">
                            <span class="total-label">Общий расход:</span>
                            <span class="total-value" id="total-consumption">---</span>
                        </div>
                        <div class="total-row highlight-row">
                            <span class="total-label">Сумма к оплате:</span>
                            <span class="total-value large" id="amount-to-pay">---</span>
                        </div>
                    </div>

                    <div id="request-actions" class="request-actions"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const requestId = urlParams.get('id');
        console.log('CSRF token:', getCookie('csrftoken'));

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function loadRequest() {
            fetch(`/api/requests/${requestId}/`)
                .then(response => response.json())
                .then(result => {
                    const data = result.data;
                    document.getElementById('request-title').textContent = `Заявка №${data.id}`;

                    const statusMap = {
                        'draft': 'Черновик',
                        'submitted': 'Отправлено',
                        'completed': 'Завершено',
                        'rejected': 'Отклонено',
                        'deleted': 'Удалено'
                    };
                    document.getElementById('request-status').textContent = statusMap[data.status] || data.status;
                    document.getElementById('request-status').className = `request-status-badge status-${data.status}`;
                    document.getElementById('request-created').textContent = data.created_at;

                    if (data.completed_at) {
                        document.getElementById('request-completed-row').style.display = 'flex';
                        document.getElementById('request-completed').textContent = data.completed_at;
                    }
                    if (data.comment) {
                        document.getElementById('request-comment-row').style.display = 'flex';
                        document.getElementById('request-comment').textContent = data.comment;
                    }

                    const positionsContainer = document.getElementById('positions-list');
                    if (!data.positions || data.positions.length === 0) {
                        positionsContainer.innerHTML = '<div class="empty-state"><a href="/" class="btn btn-primary">добавить счетчик</a></div>';
                    } else {
                        positionsContainer.innerHTML = data.positions.map(pos => `
                            <div class="request-meter-item">
                                <div class="meter-address">${pos.water_meter__address} | ${pos.water_meter__meter_type === 'HOT' ? 'ГВС' : 'ХВС'}</div>
                                <div class="meter-readings">
                                    <span class="reading-item"><span class="reading-label">Предыдущие:</span><span class="reading-value">${pos.water_meter__last_verified_reading}</span></span>
                                    <span class="reading-item"><span class="reading-label">Текущие:</span><span class="reading-value">${pos.current_reading}</span></span>
                                    <span class="reading-item"><span class="reading-label">Расход:</span><span class="reading-value highlight">${pos.consumption} м³</span></span>
                                </div>
                            </div>
                        `).join('');
                    }

                    if (data.total_consumption && data.amount_to_pay) {
                        document.getElementById('totals-section').style.display = 'block';
                        document.getElementById('total-consumption').textContent = `${data.total_consumption} м³`;
                        document.getElementById('amount-to-pay').textContent = `${data.amount_to_pay} ₽`;
                    }

                    const actionsContainer = document.getElementById('request-actions');
                    if (data.status === 'draft') {
                        actionsContainer.innerHTML = `
                            <a href="/" class="btn btn-primary">добавить счетчик</a>
                            <button id="delete-draft-btn" class="btn btn-secondary">удалить черновик</button>
                            <button id="submit-draft-btn" class="btn btn-success">подать показания</button>
                        `;
                        document.getElementById('delete-draft-btn').addEventListener('click', () => {
                            if (confirm('Удалить черновик заявки?')) {
                                fetch(`/api/requests/${requestId}/delete/`, {
                                    method: 'DELETE',
                                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                                }).then(() => window.location.href = '/request_list.html');
                            }
                        });
                        document.getElementById('submit-draft-btn').addEventListener('click', () => {
                            fetch(`/api/requests/${requestId}/submit-request/`, {
                                method: 'PUT',
                                headers: { 'X-CSRFToken': getCookie('csrftoken') }
                            }).then(() => location.reload());
                        });
                    } else {
                        actionsContainer.innerHTML = '';
                    }
                });
        }

        loadRequest();

    </script>
</body>
</html>
