<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norvoter - Регистрация</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/meters/css/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="container">
                <div class="header__inner">
                    <a href="/" class="header__logo">
                        <img src="/static/meters/imagers/logo.png" alt="Norvoter" class="logo__image">
                        <span class="logo__text">Norvoter</span>
                    </a>
                    <nav class="header__nav">
                        <a href="/" class="nav__link">счетчики</a>
                        <a href="/request_list.html" class="nav__link">заявки</a>
                    </nav>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <div class="page-header">
                    <h1 class="page-title">Регистрация</h1>
                </div>

                <div class="register-card">
                    <form id="register-form" class="register-form">
                        <div class="form-group">
                            <label for="username">Имя пользователя *</label>
                            <input type="text" id="username" name="username" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="password">Пароль *</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="account_number">Номер лицевого счёта *</label>
                            <input type="text" id="account_number" name="account_number" placeholder="Введите номер лицевого счёта" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="first_name">Имя</label>
                            <input type="text" id="first_name" name="first_name">
                        </div>
                        
                        <div class="form-group">
                            <label for="last_name">Фамилия</label>
                            <input type="text" id="last_name" name="last_name">
                        </div>
                        
                        <div class="form-group">
                            <label for="phone">Телефон</label>
                            <input type="tel" id="phone" name="phone">
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                            <a href="/login.html" class="btn btn-secondary">Уже есть аккаунт? Войти</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                account_number: document.getElementById('account_number').value,
                first_name: document.getElementById('first_name').value,
                last_name: document.getElementById('last_name').value,
                phone: document.getElementById('phone').value
            };
            
            const response = await fetch('/api/users/register/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            
            const result = await response.json();
            if (result.success) {
                alert('Регистрация успешна! Теперь вы можете войти.');
                window.location.href = '/login.html';
            } else {
                alert('Ошибка: ' + result.error);
            }
        });
    </script>
</body>
</html>
